<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>
    <header class="header">
        <a href="index.html"><img src="imagens/Logo.png" alt="" class="logo"></a>
        <div id="header_esq">
            <a href="sobreNos.html"><h1 class="sobreNos">Sobre Nós</h1></a>
            <a href="carrinho.html"><img src="imagens/carrinho.png"  class="carrinho"></a>  
            <a href="login.html"><img src="imagens/login.png" class="login" alt=""></a>
        </div> 
    </header>
    <main class="main" id="carrinho">
        <hr class="div-2">
        <div class="card-2">
            <img src="imagens/lapis/lapis1.jpg" class="img-prod-2">
            <h1 class="descr-prod">Lápis</h1>
            <h2 class="prec-prod">R$5,00</h2>
            <a href="produto.html"><p class="btn-prod">Comprar</p></a>
        </div>
        <div class="card-2">
            <img src="imagens/garrafa d'agua/garrafa1.jpg" class="img-prod-2">
            <h1 class="descr-prod">Garrafa d'Agua</h1>
            <h2 class="prec-prod">R$50,00</h2>
            <p class="btn-prod">Comprar</p>
        </div>
        <div class="card-2">
            <img src="imagens/terreno/cobre-jpg.jpg" class="img-prod-2">
            <h1 class="descr-prod">Terreno Rico em Cobre</h1>
            <h2 class="prec-prod">R$50.000,00</h2>
            <a href="produto.html"><p class="btn-prod">Comprar</p></a>
        </div>
        <button class="finalizar-compra" id="avisaCompra" onclick="avisaCompra()">Finalizar Compra</button>
    </main>
    <footer class="footer">
        <h1>Algo</h1>
    </footer>

</body>
</html>
